{% extends "base.html" %} 

{% block extrahead %} 
  {{ super() }} 
  <style>     
    #major-redesign-toast {       
      position: fixed;       
      bottom: 30px;       
      right: 30px;       
      width: 340px;  /* Slightly wider to accommodate larger text */     
      background-color: white;       
      border-left: 6px solid #ff9100;       
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);       
      border-radius: 8px;       
      padding: 20px;       
      z-index: 9999; 
      display: none;        
      color: #333;
      
      /* --- Font Adjustments --- */
      font-size: 16px;      /* Increased body text size */
      line-height: 1.5;     /* Better spacing between lines */
      font-family: Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif; /* Optional: Matches MkDocs default */
    }     
    
    [data-md-color-scheme="slate"] #major-redesign-toast {       
      background-color: #2e3240;       
      color: white;     
    }     
    
    #major-redesign-toast h4 { 
      margin: 0 0 10px 0; 
      color: #ff9100; 
      font-size: 18px;      /* Increased header size */
      font-weight: 700;
    }     
    
    #major-redesign-toast button {       
      background: #ff9100; 
      color: white; 
      border: none;       
      padding: 10px 20px;   /* Larger button padding */
      font-size: 14px;      /* Larger button text */
      border-radius: 4px; 
      cursor: pointer; 
      float: right;     
      margin-top: 5px;
    }   
  </style> 
{% endblock %} 

{% block header %}
  {{ super() }}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var option = document.querySelector(".md-header__option");
      if (!option) return;

      function makeIcon(href, title, svgBody, newTab) {
        var a = document.createElement("a");
        a.href = href;
        a.title = title;
        if (newTab) { a.target = "_blank"; a.rel = "noopener"; }
        a.className = "md-header__button md-icon";
        a.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:1.2rem;height:1.2rem;fill:currentColor;">' + svgBody + '</svg>';
        return a;
      }

      var discord = makeIcon(
        "https://discord.gg/RJJM42MBUU", "Discord",
        '<path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>',
        true
      );

      var email = makeIcon(
        "mailto:jiaweiliwork@outlook.com", "Email",
        '<path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>',
        false
      );

      // Insert in reverse order so final left→right is: email | discord | [color toggle]
      option.insertBefore(discord, option.firstChild);
      option.insertBefore(email, discord);
    });
  </script>
{% endblock %}

{% block footer %}
  {{ super() }}

  <div id="major-redesign-toast">     
    <h4>⚠️ Major Redesign</h4>     
    <p>InSARScript v1.1.0 has change of APIs, this documentation is <b>not compatible</b> with version v1.0.0.</p>     
    <button onclick="dismissToast()">OK</button>   
  </div>    

  <script>     
    document.addEventListener("DOMContentLoaded", function() {       
      const toast = document.getElementById('major-redesign-toast');       
      const storageKey = 'dismissed_redesign_notice_v110';              
      const isDismissed = localStorage.getItem(storageKey);        
      
      if (!isDismissed) {         
        toast.style.display = 'block';       
      }     
    });      
    
    function dismissToast() {       
      const toast = document.getElementById('major-redesign-toast');       
      toast.style.display = 'none';       
      localStorage.setItem('dismissed_redesign_notice_v110', 'true');     
    }   
  </script> 
{% endblock %}
